<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Job Autofill</h2>

<label><b>Profile</b></label>

<div class="profileRow">
    <select id="profileSelect"></select>
    <button id="newProfileBtn">+</button>
</div>

<div class="profileRow">
    <input type="file" id="resumeInput" accept=".pdf,.docx" style="flex:1;">
    <button id="parseResumeBtn">Upload Resume</button>
</div>
<p id="resumeStatus" class="modalError"></p>

<br>

<textarea id="jsonInput"></textarea>

<br>

<div class="buttonRow">
    <button id="saveBtn">Save Profile</button>
    <button id="fillBtn">Fill Form</button>
    <button id="deleteProfileBtn" class="deleteBtn">Delete Profile</button>
</div>

<!-- New Profile Modal -->
<div id="newProfileModal" class="modalBackdrop">
    <div class="modalBox">

        <h3>New Profile</h3>

        <label>Profile Name</label>
        <input type="text" id="inputProfileName" placeholder="e.g. My Job Search">

        <label>Applicant Name</label>
        <input type="text" id="inputApplicantName" placeholder="e.g. John Doe">

        <label>Application Type</label>
        <input type="text" id="inputApplicationType" placeholder="e.g. Employment">

        <p id="modalError" class="modalError"></p>

        <div class="modalActions">
            <button id="modalCancelBtn">Cancel</button>
            <button id="modalCreateBtn">Create</button>
        </div>

    </div>
</div>

<script src="libs/mammoth/mammoth.browser.min.js"></script>
<script src="popup.js" type="module"></script>

</body>

</html>
